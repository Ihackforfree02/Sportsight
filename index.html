            --text-dim: #6e6e73;

            --global-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

        /* Smooth Scrolling Configuration */
        html {
            scroll-behavior: smooth;
            background-color: var(--bg-white);
        }

        * {

            padding: 0;
            box-sizing: border-box;
            font-family: var(--global-font);
            letter-spacing: -0.022em;
        }

        body {

            color: var(--text-pure);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .site-nav {

            width: 100%;
            position: fixed;
            top: 0;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-container {

            max-width: 1100px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Integrated Custom Logo Structural Box */
        .nav-logo-box {
            display: flex;
            align-items: center;
            height: 38px;
            cursor: pointer;
        }

        .brand-logo-img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-pure);
        }

        .btn-action {
            background-color: var(--text-pure);
            color: var(--bg-white) !important;

            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .btn-action:hover {
            transform: scale(1.03);
            background-color: var(--sport-neon);
        }

        .hero-viewport {

        .eyebrow {

            letter-spacing: 0.12em;

        .glass-image-target:not([src]), .glass-image-target[src=""] {

        .glass-image-target:not([src])::before, .glass-image-target[src=""]::before {

            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;

        .bento-card:hover {

            background-color: #f0f0f2;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);

            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .preorder-drawer {
            position: fixed;
            top: 0;
            right: -460px;
            width: 100%;
            max-width: 460px;
            height: 100vh;

            display: flex;

        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;

            cursor: pointer;
            transition: color 0.2s;

        .drawer-close:hover { color: var(--text-pure); }

            font-size: 11px;

            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }
